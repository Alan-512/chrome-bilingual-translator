<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Feed Fixture</title>
  </head>
  <body>
    <main>
      <article id="social-post">
        <p>
          We tested a new agent workflow today and the biggest win was making the design review loop shorter.
        </p>
        <blockquote>
          The prototype looked fine at first, but the real improvement came from reducing layout noise and visual drift.
        </blockquote>
        <figure>
          <img src="/mock-card.png" alt="Prototype comparison card" />
          <figcaption>The attached comparison card highlights spacing fixes and hierarchy improvements.</figcaption>
        </figure>
        <footer>
          <button>Like</button>
          <button>Reply</button>
          <button>Share</button>
        </footer>
      </article>
    </main>
  </body>
</html>
